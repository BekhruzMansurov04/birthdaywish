<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loading">
    <div class="heart-loader">❤</div>
</div>

<div id="welcome" class="hidden">
    <div class="card">
        <h1>Ready for your surprise? 💖</h1>

        <button id="startBtn">Open Surprise</button>
    </div>
</div>

<div id="scene" class="hidden">

    <div id="tree">
        <div id="trunk"></div>
        <canvas id="branches"></canvas>

        <div id="heartContainer"></div>
    </div>

    <div id="wishBox">
        <h1>Hey Love ❤️</h1>

        <p id="typing"></p>

        <div class="gallery">
            <img src="/image.png">
            <img src="/photo_2026-06-29_19-20-39.jpg">
            <img src="/wef.jpg">
        </div>

        <h2>I Love You Forever ❤️</h2>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
